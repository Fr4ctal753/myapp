name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build APK using Docker Buildozer
        run: |
          docker run --rm \
            -v $PWD:/home/user/hostcwd \
            -w /home/user/hostcwd \
            kivy/buildozer \
            buildozer -v android debug
