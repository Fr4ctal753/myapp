name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_HOME: ${{ github.workspace }}/android-sdk
      ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install system deps
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3 python3-pip wget

    - name: Install Buildozer
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install cython buildozer

    - name: Install Android SDK + FIX AIDL
      run: |
        mkdir -p $ANDROID_HOME
        cd $HOME

        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-*.zip

        mkdir -p $ANDROID_HOME/cmdline-tools
        mv cmdline-tools $ANDROID_HOME/cmdline-tools/latest

        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME \
          "platform-tools" \
          "platforms;android-33" \
          "build-tools;33.0.2"

        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

        echo "Checking aidl:"
        find $ANDROID_HOME -name aidl

    - name: Build APK
      run: |
        export ANDROIDSDK=$ANDROID_HOME
        export ANDROID_HOME=$ANDROID_HOME
        export PATH=$PATH:$ANDROID_HOME/platform-tools

        buildozer -v android debug
