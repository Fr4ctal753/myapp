name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Buildozer in Docker (REAL FIX)
        run: |
          docker run --rm \
            -v $PWD:/home/user/app \
            kivy/buildozer:latest \
            bash -c "cd /home/user/app && buildozer android debug --allow-root"
