name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build APK inside Docker (clean environment)
        run: |
          docker run --rm \
            -v $PWD:/home/user/app \
            -w /home/user/app \
            kivy/buildozer:latest \
            bash -c "
              pip install --upgrade pip &&
              buildozer android debug --allow-root
            "
